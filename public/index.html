<!DOCTYPE html>
<html lang="zh-TW">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>系統維護中 - 暫時無法提供服務</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: "Microsoft JhengHei", "Heiti TC", "PingFang TC", sans-serif;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           min-height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
           padding: 20px;
       }

       .maintenance-container {
           background: rgba(255, 255, 255, 0.95);
           border-radius: 20px;
           padding: 60px 40px;
           max-width: 600px;
           width: 100%;
           text-align: center;
           box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
           backdrop-filter: blur(10px);
       }

       .icon {
           width: 120px;
           height: 120px;
           margin: 0 auto 30px;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           border-radius: 50%;
           display: flex;
           justify-content: center;
           align-items: center;
           animation: pulse 2s infinite;
       }

       .icon svg {
           width: 60px;
           height: 60px;
           fill: white;
       }

       @keyframes pulse {
           0%, 100% { transform: scale(1); }
           50% { transform: scale(1.05); }
       }

       h1 {
           color: #333;
           font-size: 32px;
           margin-bottom: 20px;
           font-weight: 700;
       }

       .subtitle {
           color: #666;
           font-size: 18px;
           line-height: 1.8;
           margin-bottom: 30px;
       }

       .info-box {
           background: #f8f9fa;
           border-left: 4px solid #667eea;
           padding: 20px;
           margin: 30px 0;
           text-align: left;
           border-radius: 0 8px 8px 0;
       }

       .info-box h3 {
           color: #667eea;
           font-size: 16px;
           margin-bottom: 10px;
       }

       .info-box p {
           color: #555;
           font-size: 15px;
           line-height: 1.6;
       }

       .contact {
           margin-top: 30px;
           padding-top: 30px;
           border-top: 1px solid #eee;
       }

       .contact h3 {
           color: #333;
           font-size: 16px;
           margin-bottom: 15px;
       }

       .contact-info {
           display: flex;
           justify-content: center;
           gap: 30px;
           flex-wrap: wrap;
       }

       .contact-item {
           color: #667eea;
           font-size: 15px;
           text-decoration: none;
           display: flex;
           align-items: center;
           gap: 8px;
           transition: color 0.3s;
       }

       .contact-item:hover {
           color: #764ba2;
       }

       .footer {
           margin-top: 40px;
           color: #999;
           font-size: 13px;
       }

       @media (max-width: 480px) {
           .maintenance-container {
               padding: 40px 25px;
           }
           
           h1 {
               font-size: 26px;
           }
           
           .subtitle {
               font-size: 16px;
           }
       }
   </style>
</head>
<body>
   <div class="maintenance-container">
       <div class="icon">
           <svg viewBox="0 0 24 24">
               <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
               <path d="M11 7h2v6h-2zm0 4h2v2h-2z" opacity="0.3"/>
               <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
           </svg>
       </div>

       <h1>系統維護中</h1>
       
       <p class="subtitle">
           親愛的用戶您好，<br>
           為提供更優質的服務品質，本站目前正在進行系統維護作業。<br>
           造成您的不便，敬請見諒。
       </p>
   </div>
</body>
</html>
